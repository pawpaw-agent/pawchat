name: Automated Release with APK

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  create-release-and-build:
    name: Create Release and Build APK
    runs-on: ubuntu-latest

    steps:
      # Step 1: Checkout code
      - name: Checkout code
        uses: actions/checkout@v4

      # Step 2: Setup Flutter
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.x'
          channel: 'stable'
          cache: true

      # Step 3: Install dependencies
      - name: Install dependencies
        run: flutter pub get

      # Step 4: Generate code (Hive adapters)
      - name: Generate code (Hive adapters)
        run: flutter pub run build_runner build --delete-conflicting-outputs

      # Step 5: Build debug APK
      - name: Build debug APK
        run: flutter build apk --debug
        continue-on-error: false

      # Step 6: Build release APK
      - name: Build release APK
        run: flutter build apk --release
        continue-on-error: false

      # Step 7: Get version from tag
      - name: Get version from tag
        id: get_version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      # Step 8: Create Release (if not exists)
      - name: Create Release
        id: create_release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.ref_name }}
          release_name: PawChat ${{ github.ref_name }}
          draft: false
          prerelease: false
          generate_release_notes: true

      # Step 9: Upload Debug APK
      - name: Upload Debug APK to Release
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: build/app/outputs/flutter-apk/app-debug.apk
          asset_name: PawChat-${{ steps.get_version.outputs.VERSION }}-debug.apk
          asset_content_type: application/vnd.android.package-archive

      # Step 10: Upload Release APK
      - name: Upload Release APK to Release
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: build/app/outputs/flutter-apk/app-release.apk
          asset_name: PawChat-${{ steps.get_version.outputs.VERSION }}-release.apk
          asset_content_type: application/vnd.android.package-archive
