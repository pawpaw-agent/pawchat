name: Build and Release APK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  release:
    types: [published]

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.x'
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Generate code (Hive adapters)
        run: flutter pub run build_runner build --delete-conflicting-outputs

      - name: Analyze code (non-fatal)
        run: flutter analyze --no-fatal-infos --no-fatal-warnings
        continue-on-error: true

      - name: Run tests
        run: flutter test

      - name: Build debug APK
        run: flutter build apk --debug

      - name: Build release APK
        run: flutter build apk --release

      - name: Upload debug APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: pawchat-debug-apk
          path: build/app/outputs/flutter-apk/app-debug.apk
          retention-days: 30

      - name: Upload release APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: pawchat-release-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30

  release:
    name: Upload APKs to GitHub Release
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'release' && github.event.action == 'published'

    steps:
      - name: Download debug APK
        uses: actions/download-artifact@v4
        with:
          name: pawchat-debug-apk
          path: ./artifacts

      - name: Download release APK
        uses: actions/download-artifact@v4
        with:
          name: pawchat-release-apk
          path: ./artifacts

      - name: Upload Debug APK to Release
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ github.event.release.upload_url }}
          asset_path: ./artifacts/pawchat-debug-apk/app-debug.apk
          asset_name: PawChat-${{ github.event.release.tag_name }}-debug.apk
          asset_content_type: application/vnd.android.package-archive

      - name: Upload Release APK to Release
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ github.event.release.upload_url }}
          asset_path: ./artifacts/pawchat-release-apk/app-release.apk
          asset_name: PawChat-${{ github.event.release.tag_name }}-release.apk
          asset_content_type: application/vnd.android.package-archive
