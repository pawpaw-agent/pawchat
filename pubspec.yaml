name: pawchat
description: PawChat - Android WebSocket client for OpenClaw Gateway
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  provider: ^6.0.0
  web_socket_channel: ^2.4.0
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  flutter_secure_storage: ^9.0.0
  uuid: ^4.0.0
  crypto: ^3.0.3
  pointycastle: ^3.7.4
  shared_preferences: ^2.2.2
  intl: ^0.18.1
  cupertino_icons: ^1.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  hive_generator: ^2.0.1
  build_runner: ^2.4.7
  mockito: ^5.4.3

flutter:
  uses-material-design: true
  
  # Assets directories (create when needed)
  # assets:
  #   - assets/images/
  #   - assets/icons/
